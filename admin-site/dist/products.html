  <!-- MAIN -->
  <main class="app-main">

    <div class="app-content-header">

          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <div class="card">

          <div class="card-header">
            <h3 class="card-title">Product List</h3>
            <button class="btn btn-primary float-end" data-bs-toggle="modal" data-bs-target="#addProductModal">
              Add Product
            </button>
          </div>

          <div class="card-body table-responsive">

            <table class="table table-bordered table-hover">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td>1</td>
                  <td>Sample Product A</td>
                  <td>$20</td>
                  <td>120</td>
                  <td><span class="badge bg-success">Active</span></td>
                  <td>
                    <button class="btn btn-sm btn-warning">Edit</button>
                    <button class="btn btn-sm btn-danger">Delete</button>
                  </td>
                </tr>

                <tr>
                  <td>2</td>
                  <td>Sample Product B</td>
                  <td>$45</td>
                  <td>0</td>
                  <td><span class="badge bg-danger">Out of Stock</span></td>
                  <td>
                    <button class="btn btn-sm btn-warning">Edit</button>
                    <button class="btn btn-sm btn-danger">Delete</button>

                </tr>

              </tbody>

            </table>

          </div>
        </div>

</div>
<!-- ADD PRODUCT MODAL -->
<div class="modal fade" id="addProductModal" tabindex="-1">

  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input class="form-control mb-2" placeholder="Product Name">
        <input class="form-control mb-2" placeholder="Price">
        <input class="form-control mb-2" placeholder="Stock">
        <input type="file" class="form-control mb-2" accept="image/*">
        <img id="preview" style="width:100%; max-height:200px; object-fit:cover; display:none;" />

        <script>
        document.querySelector('input[type="file"]').addEventListener('change', function (e) {
          const file = e.target.files[0];

          if (file) {
            const reader = new FileReader();

            reader.onload = function (event) {
              const img = document.getElementById('preview');
              img.src = event.target.result;
              img.style.display = 'block';
            };

            reader.readAsDataURL(file);
          }
        });
        </script>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success">Save Product</button>
      </div>

    </div>
  </div>

</div>
