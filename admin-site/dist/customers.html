<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AdminLTE | Customers</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->

    href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

  <!-- AdminLTE -->
  <link rel="stylesheet" href="./css/adminlte.css" />
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">

  <!-- HEADER -->
  <nav class="app-header navbar navbar-expand bg-body">
    <div class="container-fluid">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" data-lte-toggle="sidebar" href="#">
            <i class="bi bi-list"></i>
          </a>
        </li>
        <li class="nav-item d-none d-md-block">
          <a href="#" class="nav-link">Home</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
    <div class="sidebar-brand">
      <a href="./index.html" class="brand-link">
        <img src="./assets/img/AdminLTELogo.png"
          class="brand-image opacity-75 shadow" />
        <span class="brand-text fw-light">Admin Panel</span>
      </a>
    </div>

    <div class="sidebar-wrapper">
      <nav class="mt-2">
        <ul class="nav sidebar-menu flex-column">

          <li class="nav-item">
            <a href="./index3.html" class="nav-link">
              <i class="nav-icon bi bi-speedometer"></i>
              <p>Dashboard</p>
            </a>
          </li>

          <!-- Orders -->
              <li class="nav-item">
                <a href="./orders.html" class="nav-link">
                  <i class="nav-icon bi bi-bag-fill"></i>
                  <p>Orders</p>
                </a>
              </li>
              
          <li class="nav-item">
            <a href="./products.html" class="nav-link">
              <i class="nav-icon bi bi-box-seam"></i>
              <p>Products</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="./customers.html" class="nav-link active">
              <i class="nav-icon bi bi-people-fill"></i>
              <p>Customers</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="./discounts.html" class="nav-link">
              <i class="nav-icon bi bi-tag-fill"></i>
              <p>Discounts</p>
            </a>
          </li>

        </ul>
      </nav>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="app-main">

    <!-- HEADER -->
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row">
          <div class="col-sm-6">
            <h3 class="mb-0">Customers</h3>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="app-content">
      <div class="container-fluid">

        <div class="row">
          <div class="col-12">

            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Customer List</h3>
                <button class="btn btn-primary float-end">Add Customer</button>
              </div>

              <div class="card-body table-responsive">
                <table class="table table-bordered table-hover">

                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Phone</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>

                  <tbody>
                    <tr>
                      <td>1</td>
                      <td>John Doe</td>
                      <td>john@email.com</td>
                      <td>123-456-7890</td>
                      <td><span class="badge bg-success">Active</span></td>
                      <td>
                        <button class="btn btn-sm btn-warning">Edit</button>
                        <button class="btn btn-sm btn-danger">Delete</button>
                      </td>
                    </tr>

                    <tr>
                      <td>2</td>
                      <td>Jane Smith</td>
                      <td>jane@email.com</td>
                      <td>987-654-3210</td>
                      <td><span class="badge bg-secondary">Inactive</span></td>
                      <td>
                        <button class="btn btn-sm btn-warning">Edit</button>
                        <button class="btn btn-sm btn-danger">Delete</button>
                      </td>
                    </tr>
                  </tbody>

                </table>
              </div>

            </div>

          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="app-footer text-center">
    <strong>Software Engineering Project</strong>
  </footer>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
<script src="./js/adminlte.js"></script>

</body>
</html>
