<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>AdminLTE | Discounts</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- AdminLTE -->
  <link rel="stylesheet" href="./css/adminlte.css">
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<div class="app-wrapper">

  <!-- HEADER -->
  <nav class="app-header navbar navbar-expand bg-body">
    <div class="container-fluid">
      <a class="nav-link" data-lte-toggle="sidebar" href="#">
        <i class="bi bi-list"></i>
      </a>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
    <!--begin::Sidebar Brand-->
        <div class="sidebar-brand">
          <!--begin::Brand Link-->
          <a href="./index.html" class="brand-link">
            <!--begin::Brand Image-->
            <img
              src="./assets/img/AdminLTELogo.png"
              alt="AdminLTE Logo"
              class="brand-image opacity-75 shadow"
            />
            <!--end::Brand Image-->
            <!--begin::Brand Text-->
            <span class="brand-text fw-light">Admin Panel</span>
            <!--end::Brand Text-->
          </a>
          <!--end::Brand Link-->
        </div>
        <!--end::Sidebar Brand-->
    <div class="sidebar-wrapper">
      <nav class="mt-2">
        <ul class="nav sidebar-menu flex-column">

          <li class="nav-item">
            <a href="./index3.html" class="nav-link">
              <i class="nav-icon bi bi-speedometer"></i>
              <p>Dashboard</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="./orders.html" class="nav-link">
              <i class="nav-icon bi bi-bag-fill"></i>
              <p>Orders</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="./products.html" class="nav-link">
              <i class="nav-icon bi bi-box-seam"></i>
              <p>Products</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="./customers.html" class="nav-link">
              <i class="nav-icon bi bi-people-fill"></i>
              <p>Customers</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="./discounts.html" class="nav-link active">
              <i class="nav-icon bi bi-tag-fill"></i>
              <p>Discounts</p>
            </a>
          </li>

        </ul>
      </nav>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="app-main">

    <div class="app-content-header">
      <div class="container-fluid">
        <h3>Discounts & Sales</h3>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <!-- BUTTONS -->
        <div class="card mb-3">
          <div class="card-body d-flex gap-2">

            <button class="btn btn-primary"
              data-bs-toggle="modal"
              data-bs-target="#discountModal">
              Create Discount Code
            </button>

            <button class="btn btn-success"
              data-bs-toggle="modal"
              data-bs-target="#saleModal">
              Create Sale
            </button>

          </div>
        </div>

        <!-- TABLE (optional display area) -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Active Discounts</h3>
          </div>

          <div class="card-body table-responsive">
            <table class="table table-bordered table-hover">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Type</th>
                  <th>Code / Sale Name</th>
                  <th>Products</th>
                  <th>Value</th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td>1</td>
                  <td>Discount Code</td>
                  <td>SUMMER10</td>
                  <td>All Products</td>
                  <td>10%</td>
                </tr>

                <tr>
                  <td>2</td>
                  <td>Sale</td>
                  <td>Black Friday</td>
                  <td>Selected Items</td>
                  <td>25%</td>
                </tr>
              </tbody>

            </table>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>

<!-- ================= DISCOUNT CODE MODAL ================= -->
<div class="modal fade" id="discountModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Create Discount Code</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input class="form-control mb-2" placeholder="Discount Code (e.g. SAVE10)">

        <input class="form-control mb-2" placeholder="Discount %">

        <label class="form-label">Apply to Products</label>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" checked>
          <label class="form-check-label">All Products</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Sample Product A</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Sample Product B</label>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary">Save Discount</button>
      </div>

    </div>
  </div>
</div>

<!-- ================= SALE MODAL ================= -->
<div class="modal fade" id="saleModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Create Sale</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input class="form-control mb-2" placeholder="Sale Name (e.g. Black Friday Sale)">

        <input class="form-control mb-2" placeholder="Sale Discount %">

        <label class="form-label">Select Products</label>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Sample Product A</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Sample Product B</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Sample Product C</label>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success">Create Sale</button>
      </div>

    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/adminlte.js"></script>

</body>
</html>
